<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Analytics</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e1f5fe;
            min-height: 100vh;
            overflow-x: hidden;
            background: #000000;
        }

        .space-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(180deg, #000011 0%, #000033 50%, #000066 100%);
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        .star:nth-child(1) { width: 2px; height: 2px; top: 10%; left: 20%; animation-delay: 0s; }
        .star:nth-child(2) { width: 3px; height: 3px; top: 20%; left: 40%; animation-delay: 0.5s; }
        .star:nth-child(3) { width: 2px; height: 2px; top: 30%; left: 60%; animation-delay: 1s; }
        .star:nth-child(4) { width: 2px; height: 2px; top: 40%; left: 80%; animation-delay: 1.5s; }
        .star:nth-child(5) { width: 3px; height: 3px; top: 50%; left: 10%; animation-delay: 2s; }
        .star:nth-child(6) { width: 2px; height: 2px; top: 60%; left: 30%; animation-delay: 2.5s; }
        .star:nth-child(7) { width: 2px; height: 2px; top: 70%; left: 50%; animation-delay: 0.3s; }
        .star:nth-child(8) { width: 3px; height: 3px; top: 80%; left: 70%; animation-delay: 0.8s; }
        .star:nth-child(9) { width: 2px; height: 2px; top: 90%; left: 90%; animation-delay: 1.3s; }
        .star:nth-child(10) { width: 2px; height: 2px; top: 15%; left: 90%; animation-delay: 1.8s; }
        .star:nth-child(11) { width: 3px; height: 3px; top: 25%; left: 15%; animation-delay: 2.3s; }
        .star:nth-child(12) { width: 2px; height: 2px; top: 35%; left: 35%; animation-delay: 0.6s; }
        .star:nth-child(13) { width: 2px; height: 2px; top: 45%; left: 55%; animation-delay: 1.1s; }
        .star:nth-child(14) { width: 3px; height: 3px; top: 55%; left: 75%; animation-delay: 1.6s; }
        .star:nth-child(15) { width: 2px; height: 2px; top: 65%; left: 95%; animation-delay: 2.1s; }
        .star:nth-child(16) { width: 2px; height: 2px; top: 75%; left: 25%; animation-delay: 2.6s; }
        .star:nth-child(17) { width: 3px; height: 3px; top: 85%; left: 45%; animation-delay: 0.4s; }
        .star:nth-child(18) { width: 2px; height: 2px; top: 95%; left: 65%; animation-delay: 0.9s; }
        .star:nth-child(19) { width: 2px; height: 2px; top: 5%; left: 50%; animation-delay: 1.4s; }
        .star:nth-child(20) { width: 3px; height: 3px; top: 50%; left: 50%; animation-delay: 1.9s; }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 188, 212, 0.15);
            border: 1px solid #00bcd4;
            border-radius: 10px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(0, 188, 212, 0.2);
            backdrop-filter: blur(10px);
        }

        .header h3 {
            color: #00e5ff;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
            font-size: 24px;
            letter-spacing: 1px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info span {
            color: #b2ebf2;
            font-size: 16px;
        }

        h1, h2, h3, h4 {
            color: #00e5ff;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
        }

        .card {
            background: rgba(10, 20, 50, 0.7);
            border: 1px solid #00bcd4;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 188, 212, 0.15);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(0, 188, 212, 0.3);
        }

        input, select {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #00bcd4;
            color: #fff;
            padding: 12px 15px;
            border-radius: 5px;
            margin: 8px 0;
            width: 100%;
            font-size: 14px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #00e5ff;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        }

        input::placeholder {
            color: #80deea;
        }

        button {
            background: linear-gradient(45deg, #00bcd4, #00838f);
            border: none;
            color: #fff;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(0, 188, 212, 0.3);
        }

        button:hover {
            background: linear-gradient(45deg, #00e5ff, #00bcd4);
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.5);
            transform: scale(1.02);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }

        .chart-container {
            position: relative;
            height: 320px;
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
            border: 1px solid rgba(0, 188, 212, 0.2);
        }

        .plot-frame {
            width: 100%;
            height: 380px;
            border: 1px solid rgba(0, 188, 212, 0.25);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.25);
        }

        .muted-text {
            color: #b2ebf2;
            line-height: 1.6;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .table-wrap {
            overflow-x: auto;
            border: 1px solid rgba(0, 188, 212, 0.2);
            border-radius: 8px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 760px;
        }

        .data-table th,
        .data-table td {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(0, 188, 212, 0.15);
            text-align: left;
        }

        .data-table th {
            color: #00e5ff;
            background: rgba(0, 188, 212, 0.12);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.7px;
        }

        .data-table td {
            color: #e1f5fe;
            font-size: 14px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 78px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .badge-ok {
            background: rgba(0, 230, 118, 0.15);
            color: #00e676;
            border: 1px solid rgba(0, 230, 118, 0.35);
        }

        .badge-bad {
            background: rgba(255, 82, 82, 0.15);
            color: #ff8a80;
            border: 1px solid rgba(255, 82, 82, 0.35);
        }

        .link-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 15px;
        }

        .link-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 999px;
            text-decoration: none;
            color: #e1f5fe;
            border: 1px solid rgba(0, 188, 212, 0.3);
            background: rgba(0, 188, 212, 0.12);
            transition: all 0.3s;
        }

        .link-chip:hover {
            color: #ffffff;
            border-color: #00e5ff;
            box-shadow: 0 0 18px rgba(0, 229, 255, 0.25);
        }

        .section-hidden {
            display: none;
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }

        .alert-error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            color: #ffcdd2;
        }

        .alert-success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
            color: #c8e6c9;
        }

        .logout-btn {
            width: auto;
            padding: 10px 20px;
            background: linear-gradient(45deg, #d32f2f, #b71c1c);
        }

        .logout-btn:hover {
            background: linear-gradient(45deg, #f44336, #d32f2f);
        }

        .stats-box {
            display: flex;
            justify-content: space-around;
            text-align: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .stat-item {
            background: rgba(0, 188, 212, 0.1);
            border: 1px solid #00bcd4;
            border-radius: 8px;
            padding: 20px 40px;
            min-width: 200px;
        }

        .stat-item h4 {
            color: #80deea;
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .stat-item h2 {
            font-size: 36px;
            margin: 0;
        }

        .stat-accuracy { color: #00e676; text-shadow: 0 0 15px #00e676; }
        .stat-loss { color: #ff5252; text-shadow: 0 0 15px #ff5252; }

        label {
            color: #80deea;
            font-size: 14px;
            font-weight: bold;
            display: block;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .login-container {
            max-width: 450px;
            margin: 100px auto;
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form-container {
            max-width: 650px;
            margin: 0 auto;
        }

        .upload-form {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .upload-form > div {
            flex-grow: 1;
            min-width: 300px;
        }

        .upload-form button {
            width: auto;
            height: 48px;
            margin-top: 8px;
            min-width: 200px;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: #00bcd4;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #00e5ff;
        }
    </style>
</head>
<body>
    <div class="space-background">
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
    </div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
